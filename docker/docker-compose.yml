version: "3.8"

services:
  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/applytrack
      NODE_ENV: production
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: applytrack
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: